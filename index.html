<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Sandbox Survival</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; cursor: crosshair; }
        canvas { display: block; image-rendering: pixelated; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .btn-small { pointer-events: auto; background: #3a4b7c; color: white; border: 2px solid #1e2642; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .btn-small:hover { background: #5a6b9c; }
        #health-container { position: absolute; top: 10px; right: 20px; text-align: right; }
        #health-hearts { display: flex; flex-direction: row-reverse; gap: 2px; }
        .heart { width: 16px; height: 16px; background-color: #ff2222; border-radius: 50%; border: 2px solid #550000; }
        .heart.empty { background-color: #333; }
        #boss-bar-container { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 400px; height: 24px; background-color: #222; border: 3px solid #000; border-radius: 4px; }
        #boss-bar { width: 100%; height: 100%; background-color: #aa0000; transition: width 0.1s; }
        #boss-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 24px; text-shadow: 2px 2px 2px black; }
        #top-left-ui { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        #hotbar-container { display: flex; gap: 4px; }
        #menu-container { display: none; flex-direction: column; gap: 15px; margin-top: 5px; }
        .inv-row { display: flex; gap: 4px; }
        #middle-section { display: flex; gap: 20px; align-items: flex-start; }
        #equip-panel { display: flex; flex-direction: column; gap: 4px; }
        #chest-panel { display: none; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 2px solid #444; }
        #crafting-container { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        .slot { width: 42px; height: 42px; background-color: rgba(50, 60, 120, 0.6); border: 2px solid #1e2642; border-radius: 6px; position: relative; box-sizing: border-box; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: background 0.1s; }
        .slot:hover { background-color: rgba(80, 100, 180, 0.8); }
        .slot.active { border-color: #FFD700; background-color: rgba(100, 100, 180, 0.8); box-shadow: 0 0 8px rgba(255, 215, 0, 0.8); }
        .slot-count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; pointer-events: none; }
        .equip-label { position: absolute; left: 48px; color: #aaa; font-size: 12px; text-shadow: 1px 1px 1px black; pointer-events: none; white-space: nowrap; }
        .craft-slot { border-color: #4a5a8c; }
        .craft-slot:hover:not(.disabled) { background-color: rgba(100, 120, 200, 0.8); }
        .craft-slot.disabled { background-color: rgba(30, 30, 30, 0.8); border-color: #222; cursor: not-allowed; opacity: 0.5; }
        #tooltip { display: none; position: absolute; background: rgba(20, 20, 40, 0.9); color: white; padding: 8px 12px; border: 2px solid #1e2642; border-radius: 4px; font-size: 12px; font-family: sans-serif; pointer-events: none; z-index: 100; white-space: pre-wrap; text-shadow: 1px 1px 1px black; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        #cursor-item { display: none; position: absolute; width: 32px; height: 32px; pointer-events: none; z-index: 101; text-align: right; font-weight: bold; color: white; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;}
        #loading-screen { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; flex-direction: column; justify-content:center; align-items:center; z-index: 999; font-size: 24px; font-weight: bold; }
        
        /* --- NEW MENU STYLES --- */
        .full-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #6888b8; background-image: linear-gradient(to bottom, #3a5a8c, #6888b8 40%, #466628 40%, #244408); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .terraria-title { font-size: 80px; color: #fff; text-shadow: 0 4px 0 #888, 0 -4px 0 #888, 4px 0 0 #888, -4px 0 0 #888, 6px 6px 10px rgba(0,0,0,0.8); margin-bottom: 60px; font-family: Impact, sans-serif; letter-spacing: 4px; }
        .menu-btn { background: #3a4b7c; color: white; border: 4px solid #1e2642; padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer; margin: 10px; width: 300px; text-align: center; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: transform 0.1s, background 0.1s; }
        .menu-btn:hover { background: #FFD700; color: #000; border-color: #fff; transform: scale(1.05); }
        .hidden { display: none !important; }
        #world-select, #multi-select, #in-game-menu { background: rgba(0,0,0,0.8); }
        .world-slot { display: flex; justify-content: space-between; align-items: center; background: #3a4b7c; border: 4px solid #1e2642; width: 400px; padding: 15px; margin: 10px; border-radius: 8px; color: white; cursor: pointer; }
        .world-slot:hover { border-color: #FFD700; }
        .slot-title { font-size: 20px; font-weight: bold; }
        .slot-info { font-size: 14px; color: #ccc; }
    </style>
</head>
<body>
    <div id="main-menu" class="full-menu">
        <div class="terraria-title">TERRARIA CLONE</div>
        <div class="menu-btn" onclick="openWorldSelect('single')">Singleplayer</div>
        <div class="menu-btn" onclick="openMultiplayerMenu()">Multiplayer</div>
    </div>

    <div id="multi-select" class="full-menu hidden">
        <div class="terraria-title" style="font-size: 50px;">Multiplayer</div>
        <div class="menu-btn" onclick="openWorldSelect('host')">Host & Play</div>
        <div class="menu-btn" onclick="joinGame()">Join via Room Name</div>
        <div class="menu-btn" onclick="backToMain()">Back</div>
    </div>

    <div id="world-select" class="full-menu hidden">
        <div class="terraria-title" style="font-size: 50px;">Select World</div>
        <div id="world-slots-container"></div>
        <div class="menu-btn" onclick="backToMain()" style="margin-top: 30px; width: 200px; padding: 10px;">Back</div>
    </div>

    <div id="in-game-menu" class="full-menu hidden" style="z-index: 1000; background: rgba(0,0,0,0.6);">
        <div class="menu-btn" onclick="togglePauseMenu()">Resume</div>
        <div class="menu-btn" onclick="saveGame()">Save Game</div>
        <div class="menu-btn" onclick="exitToMainMenu()">Save & Exit</div>
    </div>

    <div id="loading-screen">
        <div id="loading-text" style="margin-bottom: 20px;">Generating World...</div>
        <div id="loading-progress" style="width: 300px; height: 20px; background: #222; border: 2px solid #fff;"><div id="loading-bar" style="width: 0%; height: 100%; background: #41980a;"></div></div>
    </div>

    <div id="ui-layer">
        <div id="health-container"><div style="color:white; font-weight:bold; margin-bottom:4px; text-shadow:1px 1px 2px black;" id="health-text">Life: 100/100</div><div id="health-hearts"></div></div>
        <div id="boss-bar-container"><div id="boss-bar"></div><div id="boss-text">Boss</div></div>
        <div id="top-left-ui">
            <div style="display:flex; gap:10px;">
                <span style="color:#FFD700; font-weight:bold; text-shadow:1px 1px 2px black; line-height:26px;" id="stats-display">Defense: 0</span>
            </div>
            <div id="hotbar-container"></div>
            <div id="menu-container">
                <div id="middle-section">
                    <div id="inventory-container" style="display:flex; flex-direction:column; gap:4px;"></div>
                    <div id="equip-panel">
                        <div style="color:white; font-weight:bold; text-shadow:1px 1px 2px black; margin-bottom:4px;">Equip</div>
                        <div id="equip-0" class="slot" onmousedown="handleSlotClick('equip', 0)"><span class="equip-label">Head</span></div>
                        <div id="equip-1" class="slot" onmousedown="handleSlotClick('equip', 1)"><span class="equip-label">Shirt</span></div>
                        <div id="equip-2" class="slot" onmousedown="handleSlotClick('equip', 2)"><span class="equip-label">Pants</span></div>
                        <div id="equip-3" class="slot" onmousedown="handleSlotClick('equip', 3)"><span class="equip-label">Accessory</span></div>
                    </div>
                    <div id="chest-panel"><div style="color:white; font-weight:bold; text-shadow:1px 1px 2px black;">Chest</div><div id="chest-grid" style="display:flex; flex-wrap:wrap; width: 184px; gap:4px;"></div></div>
                </div>
                <div><div style="color:white; font-weight:bold; text-shadow:1px 1px 2px black; margin-bottom:4px;">Crafting</div><div id="crafting-container"></div></div>
            </div>
        </div>
    </div>
    <div id="tooltip"></div>
    <div id="cursor-item"><canvas id="cursor-canvas" width="32" height="32"></canvas><span class="count" style="position:absolute; bottom:0; right:0;"></span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- FIREBASE INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyBn2LuoY0ZqHnz2nVx3ZidRVPv3GgAYRGU",
            authDomain: "fniv-f6e02.firebaseapp.com",
            projectId: "fniv-f6e02",
            storageBucket: "fniv-f6e02.firebasestorage.app",
            messagingSenderId: "752134357498",
            appId: "1:752134357498:web:705930bd9e349413b42443",
            measurementId: "G-QKNGMXXLQJ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const analytics = firebase.analytics();

        // --- SOCKET.IO INIT ---
        const socket = io("https://vrajerria-github-io.onrender.com", { autoConnect: false });
        let otherPlayers = {};
        let currentRoom = null;
        let isHost = true; 
        let serverEnemies = [];
        let serverProjectiles = [];

        socket.on("updatePlayers", (players) => {
            otherPlayers = players;
            if (socket.id && otherPlayers[socket.id]) delete otherPlayers[socket.id];
        });

        socket.on("playerUpdated", (data) => {
            if (data.id === socket.id) return;
            if (!otherPlayers[data.id]) otherPlayers[data.id] = {};
            otherPlayers[data.id].x = data.x;
            otherPlayers[data.id].y = data.y;
            otherPlayers[data.id].equip = data.equip;
            otherPlayers[data.id].activeItem = data.activeItem;
            otherPlayers[data.id].dir = data.dir;
            otherPlayers[data.id].swingAnim = data.swingAnim;

            // Host receives hit events from clients and processes damage
            if (isHost && data.hitEvents && data.hitEvents.length > 0) {
                data.hitEvents.forEach(hit => {
                    let e = enemies.find(en => en.id === hit.id);
                    if (e && e.hp > 0) {
                        e.hp -= hit.dmg;
                        e.vx = hit.dir * 6;
                        e.vy = -4;
                        e.iFrames = 10;
                        spawnParticles(e.x, e.y, '#f00', 5);
                    }
                });
            }
        });

        socket.on("worldData", (data) => {
            world = data.world;
            worldSurface = data.worldSurface;
            $('loading-screen').style.display = 'none';
            startGameLoop();
        });

        socket.on("blockUpdated", (data) => {
            if (world[data.x] && world[data.x][data.y] !== undefined) {
                world[data.x][data.y] = data.id;
                spawnParticles(data.x * TILE_SIZE, data.y * TILE_SIZE, getBlockColor(data.id), 8);
            }
        });

        socket.on("entitiesSynced", (data) => {
            if (!isHost) {
                serverEnemies = data.enemies;
                serverProjectiles = data.projectiles;
            }
        });

        socket.on("spawnProjectile", (data) => {
            if (isHost) projectiles.push(data);
        });

        // --- GAME VARIABLES & SETUP ---
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d', { alpha: false }); 
        const $ = id => document.getElementById(id); document.addEventListener('contextmenu', e => e.preventDefault());
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; ctx.imageSmoothingEnabled = false; } window.addEventListener('resize', resize); resize();

        let gameState = 'MENU'; 
        let currentSlotId = null;
        let multiplayerMode = null; 

        // --- EXPANDED SCALE CONSTANTS ---
        const TILE_SIZE = 32, WORLD_WIDTH = 800, WORLD_HEIGHT = 200, GRAVITY = 0.4, TERMINAL_VELOCITY = 12, REACH = TILE_SIZE * 5;
        const BLOCKS = { AIR:0, DIRT:1, GRASS:2, STONE:3, WOOD:4, LEAVES:5, WORKBENCH:6, COPPER_ORE:7, TORCH:8, CHEST:9, SAND:10, CACTUS:11, PLATFORM:12, CORRUPT_GRASS:13, CORRUPT_STONE:14, WATER:15 };
        const ITEMS = { SWORD:100, PICKAXE:101, AXE:102, GEL:103, COPPER_BAR:104, HELMET:105, CHEST_ARMOR:106, LEGS:107, BOW:108, ARROW:109, SUS_EYE:110, HERMES_BOOTS:111, CLOUD_BOTTLE:112, RUBY_STAFF:113, SLIME_CROWN:114, LENS:115, BONE:116, SKULL_DOLL:117 };
        
        const NAMES = {
            0:"Air", 1:"Dirt", 2:"Grass", 3:"Stone", 4:"Wood", 5:"Leaves", 6:"Workbench", 7:"Copper Ore", 8:"Torch", 9:"Chest", 10:"Sand", 11:"Cactus", 12:"Wood Platform", 13:"Corrupt Grass", 14:"Corrupt Stone", 15:"Water",
            100:"Copper Sword\n8 Melee Damage\nSlow Speed", 101:"Copper Pickaxe\n4 Mining Power", 102:"Copper Axe\n3 Axe Power", 103:"Gel", 104:"Copper Bar", 105:"Copper Helmet\n+2 Defense", 106:"Copper Chainmail\n+3 Defense", 107:"Copper Greaves\n+2 Defense",
            108:"Wooden Bow\n6 Ranged Damage", 109:"Arrow", 110:"Suspicious Eye\nSummons the Eye of Terror", 111:"Hermes Boots\nEquip to run super fast", 112:"Cloud in a Bottle\nEquip to double jump", 113:"Ruby Staff\n12 Magic Damage", 114:"Slime Crown\nSummons King Slime",
            115:"Lens", 116:"Bone", 117:"Cursed Doll\nSummons Skeletron"
        };
        const TOOL_TYPES = { NONE:0, PICKAXE:1, AXE:2, SWORD:3, BOW:4, CONSUME:5, MAGIC:6 };
        const ITEM_DATA = {
            [ITEMS.SWORD]: {type:3, dmg:8, use:25, max:1}, [ITEMS.PICKAXE]: {type:1, dmg:4, use:20, max:1}, [ITEMS.AXE]: {type:2, dmg:3, use:25, max:1}, [ITEMS.BOW]: {type:4, dmg:6, use:30, max:1}, [ITEMS.RUBY_STAFF]: {type:6, dmg:12, use:35, max:1},
            [ITEMS.HELMET]: {eq:0, def:2, max:1}, [ITEMS.CHEST_ARMOR]: {eq:1, def:3, max:1}, [ITEMS.LEGS]: {eq:2, def:2, max:1}, [ITEMS.HERMES_BOOTS]: {eq:3, def:0, max:1}, [ITEMS.CLOUD_BOTTLE]: {eq:3, def:0, max:1},
            [ITEMS.SUS_EYE]: {type:5, use:30, max:1}, [ITEMS.SLIME_CROWN]: {type:5, use:30, max:1}, [ITEMS.SKULL_DOLL]: {type:5, use:30, max:1}, [ITEMS.LENS]: {max:99}, [ITEMS.BONE]: {max:99}
        };
        const MINING_REQS = { [BLOCKS.DIRT]:1, [BLOCKS.GRASS]:1, [BLOCKS.STONE]:1, [BLOCKS.COPPER_ORE]:1, [BLOCKS.SAND]:1, [BLOCKS.CORRUPT_GRASS]:1, [BLOCKS.CORRUPT_STONE]:1, [BLOCKS.WOOD]:2, [BLOCKS.LEAVES]:2, [BLOCKS.CACTUS]:2, [BLOCKS.WORKBENCH]:2, [BLOCKS.TORCH]:0, [BLOCKS.CHEST]:2, [BLOCKS.PLATFORM]:2 };

        // --- PROCEDURAL SPRITES ---
        const SPRITES = {};
        function buildSprites() {
            function gen(id, fn) { let c = document.createElement('canvas'); c.width=32; c.height=32; fn(c.getContext('2d')); SPRITES[id]=c; }
            gen(BLOCKS.DIRT, c => { c.fillStyle='#5c4033'; c.fillRect(0,0,32,32); c.fillStyle='#4a3018'; for(let i=0;i<15;i++) c.fillRect(Math.floor(Math.random()*8)*4,Math.floor(Math.random()*8)*4,4,4); });
            gen(BLOCKS.GRASS, c => { c.drawImage(SPRITES[BLOCKS.DIRT],0,0); c.fillStyle='#41980a'; c.fillRect(0,0,32,8); for(let i=0;i<6;i++) c.fillRect(Math.floor(Math.random()*8)*4,8,4,4); });
            gen(BLOCKS.CORRUPT_GRASS, c => { c.drawImage(SPRITES[BLOCKS.DIRT],0,0); c.fillStyle='#6a0dad'; c.fillRect(0,0,32,8); for(let i=0;i<6;i++) c.fillRect(Math.floor(Math.random()*8)*4,8,4,4); });
            gen(BLOCKS.STONE, c => { c.fillStyle='#606060'; c.fillRect(0,0,32,32); c.fillStyle='#404040'; for(let i=0;i<10;i++) c.fillRect(Math.floor(Math.random()*8)*4,Math.floor(Math.random()*8)*4,8,4); });
            gen(BLOCKS.CORRUPT_STONE, c => { c.fillStyle='#3a205a'; c.fillRect(0,0,32,32); c.fillStyle='#2a104a'; for(let i=0;i<10;i++) c.fillRect(Math.floor(Math.random()*8)*4,Math.floor(Math.random()*8)*4,8,4); });
            gen(BLOCKS.COPPER_ORE, c => { c.drawImage(SPRITES[BLOCKS.STONE],0,0); c.fillStyle='#d2691e'; for(let i=0;i<8;i++) c.fillRect(Math.floor(Math.random()*8)*4,Math.floor(Math.random()*8)*4,4,4); });
            gen(BLOCKS.WOOD, c => { c.fillStyle='#4a3018'; c.fillRect(0,0,32,32); c.fillStyle='#3a2008'; for(let i=0;i<4;i++) c.fillRect(i*8,0,2,32); });
            gen(BLOCKS.LEAVES, c => { c.fillStyle='#1e7b1e'; c.fillRect(0,0,32,32); c.fillStyle='#145a14'; for(let i=0;i<20;i++) c.fillRect(Math.floor(Math.random()*8)*4,Math.floor(Math.random()*8)*4,4,4); });
            gen(BLOCKS.SAND, c => { c.fillStyle='#eedd82'; c.fillRect(0,0,32,32); c.fillStyle='#dcb850'; for(let i=0;i<12;i++) c.fillRect(Math.floor(Math.random()*8)*4,Math.floor(Math.random()*8)*4,4,4); });
            gen(BLOCKS.CACTUS, c => { c.fillStyle='#2e8b57'; c.fillRect(4,0,24,32); c.fillStyle='#000'; for(let i=0;i<8;i++) c.fillRect(4+Math.floor(Math.random()*6)*4,Math.floor(Math.random()*8)*4,2,2); });
            gen(BLOCKS.TORCH, c => { c.fillStyle='#654321'; c.fillRect(14,16,4,16); c.fillStyle='#ffaa00'; c.fillRect(12,8,8,8); c.fillStyle='#ffea00'; c.fillRect(14,10,4,4); });
            gen(BLOCKS.WORKBENCH, c => { c.fillStyle='#a0522d'; c.fillRect(0,16,32,8); c.fillRect(4,24,4,8); c.fillRect(24,24,4,8); });
            gen(BLOCKS.CHEST, c => { c.fillStyle='#8b4513'; c.fillRect(2,12,28,20); c.fillStyle='#000'; c.fillRect(2,12,28,2); c.fillStyle='#ffd700'; c.fillRect(14,16,4,6); });
            gen(BLOCKS.PLATFORM, c => { c.fillStyle='#8b4513'; c.fillRect(0,0,32,8); c.fillStyle='#000'; c.fillRect(0,8,32,2); });
            gen(BLOCKS.WATER, c => { c.fillStyle='rgba(0,100,200,0.5)'; c.fillRect(0,0,32,32); c.fillStyle='rgba(255,255,255,0.2)'; c.fillRect(0,4,32,2); });
            gen(ITEMS.SWORD, c => { c.fillStyle='#b87333'; c.fillRect(16,0,4,20); c.fillStyle='#654321'; c.fillRect(12,20,12,4); c.fillRect(16,24,4,8); });
            gen(ITEMS.PICKAXE, c => { c.fillStyle='#b87333'; c.fillRect(4,4,24,8); c.fillStyle='#654321'; c.fillRect(14,12,4,20); });
            gen(ITEMS.AXE, c => { c.fillStyle='#b87333'; c.fillRect(16,4,12,12); c.fillStyle='#654321'; c.fillRect(12,4,4,28); });
            gen(ITEMS.BOW, c => { c.strokeStyle='#8b4513'; c.lineWidth=4; c.beginPath(); c.arc(16,16,12,Math.PI/2,Math.PI*1.5); c.stroke(); c.strokeStyle='#fff'; c.lineWidth=1; c.beginPath(); c.moveTo(16,4); c.lineTo(16,28); c.stroke(); });
            gen(ITEMS.RUBY_STAFF, c => { c.fillStyle='#654321'; c.fillRect(14,6,4,26); c.fillStyle='#f00'; c.fillRect(12,0,8,8); });
            gen(ITEMS.ARROW, c => { c.fillStyle='#fff'; c.fillRect(14,0,4,4); c.fillStyle='#654321'; c.fillRect(15,4,2,24); c.fillStyle='#fff'; c.fillRect(14,28,4,4); });
            gen(ITEMS.GEL, c => { c.fillStyle='rgba(0,255,100,0.8)'; c.fillRect(8,12,16,12); });
            gen(ITEMS.COPPER_BAR, c => { c.fillStyle='#b87333'; c.fillRect(6,16,20,10); });
            gen(ITEMS.HELMET, c => { c.fillStyle='#cda434'; c.fillRect(6,6,20,16); c.clearRect(10,14,12,8); });
            gen(ITEMS.CHEST_ARMOR, c => { c.fillStyle='#cda434'; c.fillRect(8,4,16,24); c.fillRect(4,8,4,8); c.fillRect(24,8,4,8); });
            gen(ITEMS.LEGS, c => { c.fillStyle='#cda434'; c.fillRect(10,4,12,4); c.fillRect(10,8,4,20); c.fillRect(18,8,4,20); });
            gen(ITEMS.SUS_EYE, c => { c.fillStyle='#fff'; c.beginPath(); c.arc(16,16,10,0,Math.PI*2); c.fill(); c.fillStyle='#f00'; c.beginPath(); c.arc(16,16,4,0,Math.PI*2); c.fill(); });
            gen(ITEMS.SLIME_CROWN, c => { c.fillStyle='#ffd700'; c.fillRect(6,16,20,8); c.fillStyle='rgba(0,255,100,0.8)'; c.fillRect(10,8,12,8); });

        // --- MASSIVE WORLD GENERATION ---
        function generateWorld() {
            let surf = 25;
            for (let x = 0; x < WORLD_WIDTH; x++) {
                world[x] = []; 
                let isOcean = x < 60 || x > WORLD_WIDTH - 60;
                let isDesert = (x > WORLD_WIDTH*0.4 && x < WORLD_WIDTH*0.45);
                let isCorrupt = (x > WORLD_WIDTH*0.7 && x < WORLD_WIDTH*0.75);

                if (isOcean) { 
                    surf = 35 + (x < 60 ? (60-x)/2 : (x - (WORLD_WIDTH-60))/2); 
                    if(surf > 45) surf = 45;
                } else {
                    if (Math.random() > 0.7) surf += (Math.random() > 0.5 ? 1 : -1);
                    if (surf < 15) surf = 15; if (surf > 35) surf = 35;
                }
                worldSurface[x] = surf; 

                for (let y = 0; y < WORLD_HEIGHT; y++) {
                    if (y < surf) {
                        if (isOcean && y > 32) world[x][y] = BLOCKS.WATER;
                        else world[x][y] = 0;
                    } 
                    else if (y === Math.floor(surf)) world[x][y] = isOcean||isDesert ? BLOCKS.SAND : isCorrupt ? BLOCKS.CORRUPT_GRASS : BLOCKS.GRASS; 
                    else if (y > surf && y < surf + 6) world[x][y] = isOcean||isDesert ? BLOCKS.SAND : isCorrupt ? BLOCKS.DIRT : BLOCKS.DIRT; 
                    else world[x][y] = isCorrupt ? BLOCKS.CORRUPT_STONE : BLOCKS.STONE;
                }
                if (x % 50 === 0) $('loading-bar').style.width = (x / WORLD_WIDTH * 50) + '%';
            }
            for (let i = 0; i < 150; i++) { 
                let cx = Math.floor(Math.random() * WORLD_WIDTH), cy = 35 + Math.floor(Math.random() * (WORLD_HEIGHT - 40)), len = 20 + Math.floor(Math.random() * 40);
                for (let j = 0; j < len; j++) { for (let wx = -1; wx <= 1; wx++) for (let wy = -1; wy <= 1; wy++) if (cx+wx>0 && cx+wx<WORLD_WIDTH && cy+wy>0 && cy+wy<WORLD_HEIGHT && world[cx+wx][cy+wy] !== BLOCKS.WATER) world[cx+wx][cy+wy] = 0; cx += (Math.random() > 0.5 ? 1 : -1) * Math.floor(Math.random() * 3); cy += (Math.random() > 0.5 ? 1 : -1) * Math.floor(Math.random() * 3); }
            }
            for (let x = 0; x < WORLD_WIDTH; x++) for (let y = 30; y < WORLD_HEIGHT; y++) if ((world[x][y] === BLOCKS.STONE || world[x][y] === BLOCKS.CORRUPT_STONE) && Math.random() < 0.04) { world[x][y] = 7; if(x<WORLD_WIDTH-1) world[x+1][y] = 7; } 
            for (let x = 3; x < WORLD_WIDTH - 3; x++) { 
                let sy = Math.floor(worldSurface[x]), isDesert = (x > WORLD_WIDTH*0.4 && x < WORLD_WIDTH*0.45), isCorrupt = (x > WORLD_WIDTH*0.7 && x < WORLD_WIDTH*0.75), isOcean = x < 60 || x > WORLD_WIDTH - 60;
                if (!isDesert && !isCorrupt && !isOcean && world[x][sy] === BLOCKS.GRASS && Math.random() < 0.15) { 
                    let th = Math.floor(Math.random() * 3) + 4; for (let i = 1; i <= th; i++) world[x][sy - i] = BLOCKS.WOOD;
                    for (let lx = x - 1; lx <= x + 1; lx++) for (let ly = sy - th - 2; ly <= sy - th; ly++) if (world[lx][ly] === 0) world[lx][ly] = BLOCKS.LEAVES; x += 2;

                if(this.iFrames>0) this.iFrames--; this.timer++;
                let target = getClosestTarget(this.x, this.y);
                let pCx = target.x+target.width/2, pCy = target.y+target.height/2, dx = pCx - (this.x+this.width/2), dy = pCy - (this.y+this.height/2);
                if(this.state==='float') {
                    this.vx += (dx*0.01 - this.vx)*0.05; this.vy += ((dy-150)*0.01 - this.vy)*0.05;
                    if(this.timer>200) { this.state='spin'; this.timer=0; }
                } else if(this.state==='spin') {
                    this.vx = dx*0.02; this.vy = dy*0.02;
                    if(this.timer>100) { this.state='float'; this.timer=0; }
                }
                this.x+=this.vx; this.y+=this.vy;
                if(checkOverlap(this, player) && this.hp>0) { player.takeDmg(this.dmg); player.vx=(player.x>this.x)?10:-10; player.vy=-5; } triggerUI();
            }
        }

        class KingSlime {
            constructor(x, y) { this.id = Math.random().toString(36).substr(2, 9); this.type="KingSlime"; this.x=x; this.y=y; this.width=96; this.height=64; this.vx=1; this.vy=0; this.jumpPower=12; this.grounded=false; this.jTimer=60; this.hp=800; this.maxHp=800; this.iFrames=0; this.isBoss=true; this.name="King Slime"; this.dmg=30; }
            update() {
                if(this.iFrames>0) this.iFrames--; this.jTimer--;
                let target = getClosestTarget(this.x, this.y);
                if(Math.abs(this.vx)>1.5) this.vx *= 0.9; else if(this.grounded && this.jTimer<=0) { this.vy = -this.jumpPower; this.grounded = false; this.jTimer=80; this.vx=(target.x > this.x ? 1 : -1)*4; if(Math.random()<0.5) enemies.push(new Slime(this.x+32, this.y)); }
                this.vy+=GRAVITY; if(this.vy>TERMINAL_VELOCITY) this.vy=TERMINAL_VELOCITY;
                let pX = this.x; this.x+=this.vx; entityCollide(this, 'x'); if(this.x===pX && Math.abs(this.vx)<=1.5 && this.vx!==0) this.vx*=-1;
                this.y+=this.vy; entityCollide(this, 'y');
                if(this.y > WORLD_HEIGHT*TILE_SIZE) this.hp = 0; 
                if(checkOverlap(this, player) && this.hp>0) { player.takeDmg(this.dmg); player.vx=(player.x>this.x)?8:-8; player.vy=-5; } triggerUI();
            }
        }

        // Mapping for rendering objects that came over the socket network
        const ENEMY_DRAW = {
            'Slime': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : 'rgba(0,255,100,0.8)'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy+4), e.width, e.height-4); ctx.fillRect(Math.floor(e.x-cx+4), Math.floor(e.y-cy), e.width-8, 4); },
            'Crab': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : '#c33'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy+4), e.width, e.height-4); ctx.fillRect(Math.floor(e.x-cx-4), Math.floor(e.y-cy), 6, 8); ctx.fillRect(Math.floor(e.x-cx+e.width-2), Math.floor(e.y-cy), 6, 8); },
            'Jellyfish': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : 'rgba(255,100,200,0.8)'; ctx.beginPath(); ctx.arc(Math.floor(e.x-cx+8), Math.floor(e.y-cy+8), 8, Math.PI, 0); ctx.fill(); ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy+8), 16, 8); },
            'Zombie': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : '#2e8b57'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy), e.width, e.height); ctx.fillStyle='#000'; ctx.fillRect(Math.floor(e.x-cx+4), Math.floor(e.y-cy+4), 4, 4); ctx.fillRect(Math.floor(e.x-cx+12), Math.floor(e.y-cy+4), 4, 4); },
            'Skeleton': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : '#ddd'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy), e.width, e.height); ctx.fillStyle='#000'; ctx.fillRect(Math.floor(e.x-cx+4), Math.floor(e.y-cy+4), 4, 4); ctx.fillRect(Math.floor(e.x-cx+12), Math.floor(e.y-cy+4), 4, 4); },
            'DemonEye': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : '#a00'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy), e.width, e.height); ctx.fillStyle='#fff'; ctx.fillRect(Math.floor(e.x-cx+8), Math.floor(e.y-cy+8), 8, 8); ctx.fillStyle='#00f'; ctx.fillRect(Math.floor(e.x-cx+10+(e.vx>0?2:-2)), Math.floor(e.y-cy+10), 4, 4); },
            'Eater': (e, cx, cy) => { ctx.fillStyle = e.iFrames>0 ? '#fff' : '#6a0dad'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy), e.width, e.height); ctx.fillStyle='#f00'; ctx.fillRect(Math.floor(e.x-cx+(e.vx>0?16:4)), Math.floor(e.y-cy+8), 4, 4); },
            'EyeBoss': (e, cx, cy) => { if(e.iFrames>0 && Math.floor(Date.now()/50)%2===0) return; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(Math.floor(e.x-cx+32), Math.floor(e.y-cy+32), 32, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = e.hp < 300 ? '#f00' : '#00f'; ctx.beginPath(); ctx.arc(Math.floor(e.x-cx+32), Math.floor(e.y-cy+32), 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(Math.floor(e.x-cx+32), Math.floor(e.y-cy+32), 6, 0, Math.PI*2); ctx.fill(); },
            'Skeletron': (e, cx, cy) => { if(e.iFrames>0 && Math.floor(Date.now()/50)%2===0) return; ctx.fillStyle='#ddd'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy), 64, 64); ctx.fillStyle='#000'; ctx.fillRect(Math.floor(e.x-cx+12), Math.floor(e.y-cy+16), 12, 16); ctx.fillRect(Math.floor(e.x-cx+40), Math.floor(e.y-cy+16), 12, 16); ctx.fillRect(Math.floor(e.x-cx+20), Math.floor(e.y-cy+45), 24, 8); },
            'KingSlime': (e, cx, cy) => { if(e.iFrames>0 && Math.floor(Date.now()/50)%2===0) return; ctx.fillStyle = 'rgba(0,100,255,0.7)'; ctx.fillRect(Math.floor(e.x-cx), Math.floor(e.y-cy+16), e.width, e.height-16); ctx.fillRect(Math.floor(e.x-cx+16), Math.floor(e.y-cy), e.width-32, 16); ctx.fillStyle = '#ffd700'; ctx.fillRect(Math.floor(e.x-cx+32), Math.floor(e.y-cy-16), 32, 16); }
        };

        let enemies = [];
        const camera = { x: 0, y: 0, update: function() { this.x = player.x-canvas.width/2+player.width/2; this.y = player.y-canvas.height/2+player.height/2; if(this.x<0) this.x=0; if(this.y<0) this.y=0; if(this.x>WORLD_WIDTH*TILE_SIZE-canvas.width) this.x=WORLD_WIDTH*TILE_SIZE-canvas.width; if(this.y>WORLD_HEIGHT*TILE_SIZE-canvas.height) this.y=WORLD_HEIGHT*TILE_SIZE-canvas.height; }};

        function checkStations() {
            let o = nearWorkbench; nearWorkbench = false; let px = Math.floor(player.x/TILE_SIZE), py = Math.floor(player.y/TILE_SIZE);
            for(let x=px-3; x<=px+3; x++) for(let y=py-3; y<=py+3; y++) if(x>=0&&x<WORLD_WIDTH&&y>=0&&y<WORLD_HEIGHT && world[x][y]===6) nearWorkbench = true;
            if (o !== nearWorkbench) triggerUI();
        }

        let interactCooldown = 0;
        function handleMouseInteraction() {
            if(inventoryOpen) { miningData.progress = 0; return; }
            let tX = Math.floor((mouse.x+camera.x)/TILE_SIZE), tY = Math.floor((mouse.y+camera.y)/TILE_SIZE);
            if(tX<0||tX>=WORLD_WIDTH||tY<0||tY>=WORLD_HEIGHT) return;
            let pX = player.x+player.width/2, pY = player.y+player.height/2, bX = tX*TILE_SIZE+16, bY = tY*TILE_SIZE+16;
            let actItem = inventory[activeSlot], isTool = ITEM_DATA[actItem?.id];
            if (isTool && (isTool.type === TOOL_TYPES.BOW || isTool.type === TOOL_TYPES.MAGIC)) return; 

            if (mouse.rightDown && !mouse.prevRightDown && interactCooldown===0 && actItem && isHost) {
                if (actItem.id === ITEMS.SUS_EYE && gameTime >= 12000 && !enemies.some(e => e.isBoss)) {
                    actItem.count--; if(actItem.count<=0) actItem.id=0; triggerUI(); interactCooldown=30; enemies.push(new EyeBoss(player.x, player.y - 300)); return;
                }
                if (actItem.id === ITEMS.SLIME_CROWN && !enemies.some(e => e.isBoss)) {
                    actItem.count--; if(actItem.count<=0) actItem.id=0; triggerUI(); interactCooldown=30; enemies.push(new KingSlime(player.x, player.y - 300)); return;
                }
                if (actItem.id === ITEMS.SKULL_DOLL && !enemies.some(e => e.isBoss)) {
                    actItem.count--; if(actItem.count<=0) actItem.id=0; triggerUI(); interactCooldown=30; enemies.push(new Skeletron(player.x, player.y - 300)); return;
                }
            }

            if(Math.hypot(bX-pX, bY-pY) <= REACH) {
                if(mouse.rightDown && !mouse.prevRightDown && world[tX][tY] === BLOCKS.CHEST) {
                    activeChestKey = `${tX},${tY}`; if(!chestData[activeChestKey]) chestData[activeChestKey] = Array.from({length: CHEST_SIZE}, () => ({id: 0, count: 0}));
                    inventoryOpen = true; $('menu-container').style.display = 'flex'; triggerUI(); return;
                }
                if(mouse.rightDown && !mouse.prevRightDown && (world[tX][tY] === 0 || world[tX][tY] === BLOCKS.WATER) && !isTool && actItem?.id>0 && actItem.count>0) {
                    if(!checkOverlap({x:tX*TILE_SIZE,y:tY*TILE_SIZE,width:32,height:32}, player) || actItem.id===8 || actItem.id===BLOCKS.PLATFORM) { 
                        world[tX][tY]=actItem.id; actItem.count--; if(actItem.count<=0) actItem.id=0; 
                        if (socket.connected) socket.emit("blockUpdate", { worldId: currentRoom, x: tX, y: tY, id: world[tX][tY] });
                        triggerUI(); checkStations(); 
                    }
                }
                
                if(player.justSwung && world[tX][tY] !== 0 && world[tX][tY] !== BLOCKS.WATER) {
                    let tBlock = world[tX][tY], req = MINING_REQS[tBlock];
                    if(req === 0 || (isTool && isTool.type === req)) {
                        if(tBlock === BLOCKS.CHEST) { let key = `${tX},${tY}`; if(chestData[key] && chestData[key].some(s => s.count > 0)) { miningData.progress=0; return; } }
                        if(miningData.x !== tX || miningData.y !== tY) { miningData.x = tX; miningData.y = tY; miningData.progress = 0; }
                        miningData.progress += (isTool ? isTool.dmg : 1);
                        if(miningData.progress > 15) { 
                            if(tBlock !== BLOCKS.LEAVES) { let mined = tBlock===2?1:tBlock===13?1:tBlock; giveItem(mined, 1); }
                            spawnParticles(tX*TILE_SIZE, tY*TILE_SIZE, getBlockColor(tBlock), 8); 
                            world[tX][tY]=0; 
                            if (socket.connected) socket.emit("blockUpdate", { worldId: currentRoom, x: tX, y: tY, id: 0 });
                            miningData.progress=0; checkStations();
                        }
                    } else miningData.progress = 0;
                } else if (!mouse.leftDown) miningData.progress = 0;
            } else miningData.progress = 0;
        }

        function update() {
            if (gameState !== 'PLAYING') return; 
            try {
                gameTime = (gameTime+TIME_SPEED)%24000; player.update();
                
                // HOST-ONLY AI AND PHYSICS SYNC
                if (isHost) {
                    let isDay = gameTime<12000;
                    let maxEnemies = isDay ? 3 : 15;
                    if(enemies.length<maxEnemies && Math.random()<0.02) { 
                        let sX = camera.x+(Math.random()>0.5?canvas.width+100:-100); 
                        if(sX>0&&sX<WORLD_WIDTH*TILE_SIZE) {
                            let isCorrupt = (sX > WORLD_WIDTH*TILE_SIZE*0.7 && sX < WORLD_WIDTH*TILE_SIZE*0.75);
                            let isOcean = (sX < 60*TILE_SIZE || sX > (WORLD_WIDTH-60)*TILE_SIZE);
                            if (isOcean && Math.random() < 0.5) enemies.push(Math.random()<0.5 ? new Crab(sX, camera.y+50) : new Jellyfish(sX, camera.y+50));
                            else if (isCorrupt) enemies.push(new Eater(sX, camera.y+100));
                            else if (!isDay && Math.random()<0.4) enemies.push(new Zombie(sX, 0));
                            else if (!isDay && Math.random()<0.3) enemies.push(new DemonEye(sX, camera.y+50));
                            else if (player.y > 35*TILE_SIZE && Math.random()<0.5) enemies.push(new Skeleton(sX, 0));
                            else enemies.push(new Slime(sX,0)); 
                        }
                    }
                    
                    enemies.forEach(e => { 
                        e.update(); 
                        if(e.hp<=0) { 
                            if(e.isBoss) { 
                                giveItem(ITEMS.COPPER_BAR, 20); giveItem(ITEMS.ARROW, 50); 
                                if(e.name==="Skeletron") giveItem(ITEMS.BONE, 30);
                                triggerUI(); 
                            } else {
                                if (e.constructor.name === 'Slime' && Math.random()>0.3) giveItem(ITEMS.GEL,1); 
                                if (e.constructor.name === 'DemonEye' && Math.random()>0.3) giveItem(ITEMS.LENS,1);
                                if (e.constructor.name === 'Skeleton' && Math.random()>0.5) giveItem(ITEMS.BONE,1);
                            }
                            spawnParticles(e.x, e.y, '#f00', 15);
                        }
                    }); 
                    enemies = enemies.filter(e => e.hp>0);

                    for (let i = projectiles.length - 1; i >= 0; i--) {
                        let p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                        if(p.type === 'arrow') p.vy += 0.2;
                        else if(p.type === 'magic') { spawnParticles(p.x-16, p.y-16, '#f00', 1); if(p.life%5===0 && p.vy<10) p.vy+=0.5; }
                        
                        let tX = Math.floor(p.x/TILE_SIZE), tY = Math.floor(p.y/TILE_SIZE);
                        let hitBlock = false;
                        if (tX>=0 && tX<WORLD_WIDTH && tY>=0 && tY<WORLD_HEIGHT && world[tX][tY] !== 0 && world[tX][tY] !== 8 && world[tX][tY] !== 4 && world[tX][tY] !== 5 && world[tX][tY] !== 11 && world[tX][tY] !== 12 && world[tX][tY] !== 15) {
                            if(p.type==='arrow') hitBlock = true; 
                            else if(p.type==='magic') { p.vx *= -1; p.vy *= -1; p.x+=p.vx; p.y+=p.vy; }
                        }
                        if (hitBlock) { projectiles.splice(i, 1); continue; }
                        
                        let hit = false; for (let e of enemies) { if (p.x > e.x && p.x < e.x+e.width && p.y > e.y && p.y < e.y+e.height) { e.hp -= p.dmg; e.vx = (p.vx > 0 ? 1 : -1) * 4; e.vy = -2; e.iFrames = 10; spawnParticles(e.x, e.y, '#f00', 5); hit = true; break; } }
                        if (hit || p.life <= 0) projectiles.splice(i, 1);
                    }

                    if (socket.connected && gameTime % 2 === 0) {
                        socket.emit("syncEntities", { worldId: currentRoom, enemies: enemies, projectiles: projectiles });
                    }
                } else {
                    // Clients just keep their enemies mirroring the host's synced arrays
                    enemies = serverEnemies;
                    projectiles = serverProjectiles;
                }
                
                // Particle physics remain strictly local
                for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.vy+=0.2; p.x+=p.vx; p.y+=p.vy; p.life--; if(p.life<=0) particles.splice(i,1); }
                
                camera.update(); handleMouseInteraction();
                if(inventoryOpen && Math.random()<0.1) checkStations(); 
                if(needsUIUpdate) { updateUI(); needsUIUpdate = false; }
                
                mouse.prevRightDown = mouse.rightDown; Object.assign(prevKeys, keys);
            } catch(err) { console.error("Game Loop Error:", err); }
        }

        function draw() {
            if (gameState === 'MENU') return;
            
            let isDay = gameTime<12000; ctx.fillStyle = isDay ? '#87CEEB' : '#050510'; ctx.fillRect(0,0,canvas.width,canvas.height); 
            if (!world || world.length === 0) return; // Prevent render error while client is downloading
            
            let sC = Math.max(0, Math.min(WORLD_WIDTH - 1, Math.floor(camera.x/TILE_SIZE)));
            let eC = Math.max(sC + 1, Math.min(WORLD_WIDTH, sC + Math.ceil(canvas.width/TILE_SIZE) + 1));
            let sR = Math.max(0, Math.min(WORLD_HEIGHT - 1, Math.floor(camera.y/TILE_SIZE)));
            let eR = Math.max(sR + 1, Math.min(WORLD_HEIGHT, sR + Math.ceil(canvas.height/TILE_SIZE) + 1));

            let vW = eC - sC, vH = eR - sR; if(vH <= 0 || vW <= 0) return; 
            let lightMap = new Float32Array(vW * vH); let skyL = isDay ? 1.0 : 0.15;
            
            for(let x=sC; x<eC; x++) {
                let surf = worldSurface[x]; 
                for(let y=sR; y<eR; y++) {
                    let baseL = 0.03; 
                    if (y <= surf) baseL = skyL; 
                    else if (y === surf + 1) baseL = skyL * 0.7; 
                    else if (y === surf + 2) baseL = skyL * 0.4; 
                    else if (y === surf + 3) baseL = skyL * 0.1;
                    lightMap[(x-sC) + (y-sR)*vW] = baseL; 
                }
            }

            let lights = [{ tx: Math.floor((player.x+10)/TILE_SIZE), ty: Math.floor((player.y+20)/TILE_SIZE), r: 6, str: 0.6 }];
            for(let p of projectiles) if(p.type==='magic') lights.push({tx: Math.floor(p.x/TILE_SIZE), ty: Math.floor(p.y/TILE_SIZE), r: 8, str: 1.0});
            for(let x=sC-10; x<eC+10; x++) for(let y=sR-10; y<eR+10; y++) { if(x>=0 && x<WORLD_WIDTH && y>=0 && y<WORLD_HEIGHT && world[x][y] === BLOCKS.TORCH) lights.push({tx: x, ty: y, r: 12, str: 1.0}); }

            for(let l of lights) {
                let minX = Math.max(sC, l.tx - l.r), maxX = Math.min(eC, l.tx + l.r), minY = Math.max(sR, l.ty - l.r), maxY = Math.min(eR, l.ty + l.r), rSq = l.r * l.r;
                for(let x=minX; x<maxX; x++) {
                    for(let y=minY; y<maxY; y++) {
                        let distSq = (x - l.tx)*(x - l.tx) + (y - l.ty)*(y - l.ty);
                        if(distSq < rSq) {
                            let idx = (x-sC) + (y-sR)*vW, bright = l.str * (1 - Math.sqrt(distSq)/l.r);
                            if(bright > lightMap[idx]) lightMap[idx] = bright;
                        }
                    }
                }
            }

            for(let x=sC; x<eC; x++) {
                for(let y=sR; y<eR; y++) {
                    let dX = Math.floor(x*TILE_SIZE-camera.x), dY = Math.floor(y*TILE_SIZE-camera.y);
                    if (y >= worldSurface[x]) { ctx.fillStyle = y > 35 ? '#1a1a1a' : '#2a1a0a'; ctx.fillRect(dX, dY, TILE_SIZE+1, TILE_SIZE+1); }
                    let t = world[x][y]; if (t !== 0 && SPRITES[t]) ctx.drawImage(SPRITES[t], dX, dY, TILE_SIZE+1, TILE_SIZE+1);
                    if (miningData.progress > 0 && miningData.x === x && miningData.y === y) {
                        let cSp = miningData.progress > 12 ? SPRITES['CRACK_3'] : miningData.progress > 6 ? SPRITES['CRACK_2'] : SPRITES['CRACK_1'];
                        if(cSp) ctx.drawImage(cSp, dX, dY, TILE_SIZE+1, TILE_SIZE+1);
                    }
                    let lightLevel = lightMap[(x-sC) + (y-sR)*vW];
                    if (lightLevel < 1) { ctx.fillStyle = `rgba(0,0,0,${1 - lightLevel})`; ctx.fillRect(dX, dY, TILE_SIZE+1, TILE_SIZE+1); }
                }
            }
            
            // DRAW LOCAL PLAYER
            player.draw(camera.x, camera.y); 
            
            // DRAW OTHER PLAYERS IN REAL-TIME WITH THEIR EXACT ANIMATIONS AND ITEMS
            for (let id in otherPlayers) {
                let p = otherPlayers[id];
                if (p.x !== undefined && p.y !== undefined) {
                    drawPlayerSprite(p.x, p.y, p.equip, p.activeItem, p.dir, p.swingAnim, camera.x, camera.y);
                    
                    // Add a tiny nameplate dot so you know it's a teammate
                    ctx.fillStyle = '#f00'; ctx.fillRect(Math.floor(p.x-camera.x+8), Math.floor(p.y-camera.y-10), 4, 4);
                }
            }

            // DRAW ENEMIES (Handles both Host objects and Client raw JSON)
            enemies.forEach(e => {
                if (e.draw) e.draw(camera.x, camera.y); // For Host
                else if (ENEMY_DRAW[e.type]) ENEMY_DRAW[e.type](e, camera.x, camera.y); // For Client rendering server array
            });

            projectiles.forEach(p => { ctx.fillStyle = p.type==='arrow'?'#fff':'#f00'; ctx.fillRect(Math.floor(p.x-camera.x-2), Math.floor(p.y-camera.y-2), 4, 4); });
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(Math.floor(p.x-camera.x), Math.floor(p.y-camera.y), Math.max(2, p.life/10), Math.max(2, p.life/10)); });

            let actItem = inventory[activeSlot];
            if(!inventoryOpen && (!ITEM_DATA[actItem?.id] || (ITEM_DATA[actItem.id].type!==TOOL_TYPES.BOW && ITEM_DATA[actItem.id].type!==TOOL_TYPES.MAGIC))) {
                let tX = Math.floor((mouse.x+camera.x)/TILE_SIZE), tY = Math.floor((mouse.y+camera.y)/TILE_SIZE), pX = player.x+10, pY = player.y+20, bX = tX*TILE_SIZE+16, bY = tY*TILE_SIZE+16;
                if(Math.hypot(bX-pX, bY-pY)<=REACH) { ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.strokeRect(Math.floor(tX*TILE_SIZE-camera.x),Math.floor(tY*TILE_SIZE-camera.y),TILE_SIZE,TILE_SIZE); ctx.lineWidth=1; }
            }
        }

        function loop() { 
            if (gameState === 'PLAYING') {
                update(); 
                draw(); 
                requestAnimationFrame(loop); 
            }
        }
    </script>
